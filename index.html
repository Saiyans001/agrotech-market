<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroTech Market — Terres & Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --earth: #2C1A0E;
    --moss: #3D5A2A;
    --wheat: #C8A84B;
    --sand: #E8D5A3;
    --cream: #F5EDD8;
    --tech-blue: #1A3A5C;
    --tech-cyan: #00B8D9;
    --leaf: #6BBF59;
    --rust: #C45C2A;
    --white: #FAFAF7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--earth);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--sand); }
  ::-webkit-scrollbar-thumb { background: var(--moss); border-radius: 3px; }

  /* ─── HEADER ─── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--earth);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem;
    height: 64px;
    border-bottom: 2px solid var(--wheat);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--cream);
    display: flex; align-items: center; gap: .6rem;
    text-decoration: none;
  }
  .logo span { color: var(--wheat); font-style: italic; }
  .logo-dot { width: 8px; height: 8px; background: var(--leaf); border-radius: 50%; display: inline-block; }

  nav { display: flex; gap: 2rem; }
  nav a {
    color: var(--sand); font-size: .85rem; font-weight: 600;
    text-decoration: none; letter-spacing: .08em; text-transform: uppercase;
    transition: color .2s;
    position: relative;
  }
  nav a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
    background: var(--wheat); transition: width .2s;
  }
  nav a:hover { color: var(--wheat); }
  nav a:hover::after { width: 100%; }

  .header-actions { display: flex; align-items: center; gap: 1rem; }

  .search-bar {
    background: rgba(255,255,255,.08); border: 1px solid rgba(200,168,75,.3);
    border-radius: 20px; padding: .35rem 1rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--cream); font-family: 'Syne', sans-serif; font-size: .82rem;
    width: 160px;
  }
  .search-bar input::placeholder { color: rgba(232,213,163,.5); }
  .search-bar svg { stroke: var(--wheat); }

  .btn-cart {
    background: var(--wheat); color: var(--earth);
    border: none; border-radius: 20px; padding: .4rem 1.1rem;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: .82rem;
    cursor: pointer; display: flex; align-items: center; gap: .4rem;
    transition: background .2s, transform .15s;
  }
  .btn-cart:hover { background: var(--leaf); transform: scale(1.04); }
  .cart-count {
    background: var(--rust); color: #fff;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: .7rem; display: flex; align-items: center; justify-content: center;
  }

  /* ─── HERO ─── */
  .hero {
    margin-top: 64px;
    min-height: 520px;
    background: linear-gradient(135deg, var(--earth) 0%, #1A2E0A 50%, var(--tech-blue) 100%);
    display: grid; grid-template-columns: 1fr 1fr;
    position: relative; overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(107,191,89,.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 30%, rgba(0,184,217,.12) 0%, transparent 50%);
  }

  /* grain texture */
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .hero-left {
    padding: 5rem 3rem 4rem;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; z-index: 2;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: .5rem;
    background: rgba(107,191,89,.15); border: 1px solid rgba(107,191,89,.4);
    color: var(--leaf); border-radius: 20px;
    padding: .3rem .9rem; font-size: .75rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 1.5rem; width: fit-content;
    animation: fadeUp .6s ease both;
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.4rem, 4vw, 3.5rem);
    color: var(--cream); line-height: 1.1;
    animation: fadeUp .6s .1s ease both;
  }
  .hero h1 em { color: var(--wheat); font-style: italic; }

  .hero-sub {
    margin-top: 1rem; color: var(--sand); font-size: .95rem;
    max-width: 380px; line-height: 1.6;
    animation: fadeUp .6s .2s ease both;
  }

  .hero-ctas {
    margin-top: 2rem; display: flex; gap: 1rem;
    animation: fadeUp .6s .3s ease both;
  }

  .btn-primary {
    background: var(--wheat); color: var(--earth);
    border: none; border-radius: 4px; padding: .75rem 1.8rem;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: .88rem;
    letter-spacing: .05em; text-transform: uppercase;
    cursor: pointer; transition: background .2s, transform .15s;
  }
  .btn-primary:hover { background: var(--leaf); transform: translateY(-2px); }

  .btn-outline {
    background: transparent; color: var(--cream);
    border: 1px solid rgba(232,213,163,.4); border-radius: 4px;
    padding: .75rem 1.8rem;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: .88rem;
    letter-spacing: .05em; text-transform: uppercase;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-outline:hover { border-color: var(--wheat); color: var(--wheat); }

  .hero-right {
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2; padding: 2rem;
  }

  .hero-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1rem; width: 100%; max-width: 380px;
    animation: fadeUp .6s .2s ease both;
  }

  .stat-card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(200,168,75,.2);
    border-radius: 12px; padding: 1.4rem;
    backdrop-filter: blur(8px);
    transition: border-color .2s, background .2s;
  }
  .stat-card:hover {
    background: rgba(255,255,255,.1);
    border-color: rgba(200,168,75,.5);
  }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 2rem; font-weight: 700; color: var(--wheat);
    display: block;
  }
  .stat-label { font-size: .78rem; color: var(--sand); margin-top: .2rem; }
